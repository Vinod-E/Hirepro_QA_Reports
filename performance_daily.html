<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Performance Report | Under Process</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .pulse { animation: pulse-soft 3s infinite ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-10 text-center">
        <div class="flex flex-col items-center gap-6 mb-8">
            <img src="https://hirepro.in/wp-content/uploads/2025/05/HirePro-logo.svg" alt="HirePro Logo" class="h-10 w-auto">
            <div class="h-px w-12 bg-slate-200"></div>
            <h1 class="text-3xl font-black tracking-tighter text-slate-900">QA<span class="font-extralight text-slate-500">Insights</span></h1>
        </div>

        <div class="relative inline-block mb-8">
            <div class="p-6 rounded-full bg-orange-500/10 pulse">
                <i data-lucide="construction" class="w-12 h-12 text-orange-500"></i>
            </div>
            <div class="absolute -top-1 -right-1 flex h-4 w-4">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-4 w-4 bg-orange-500"></span>
            </div>
        </div>

        <h2 class="text-xl font-bold text-slate-800 mb-2 uppercase tracking-tight">Performance Report - Daily</h2>
        <p class="text-slate-500 text-sm font-medium mb-10 leading-relaxed uppercase tracking-widest opacity-80">
            This module is currently<br>
            <span class="text-orange-600 font-extrabold">Under Process</span>
        </p>

        <a href="dashboard.html" 
           class="flex items-center justify-center gap-2 w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 rounded-2xl text-xs tracking-widest transition-all shadow-lg uppercase group">
            <i data-lucide="arrow-left" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i>
            Back to Dashboard
        </a>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
